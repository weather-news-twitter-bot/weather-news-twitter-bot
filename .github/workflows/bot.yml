name: 🌤️ WNL Timetable Bot

on:
  schedule:
    # 毎時 :17（UTC）。:00 は混雑で遅延/スキップが多いので外す。
    # 告知(21時JST)/監視は weather_bot.py 側が JST 時刻で判定する。
    - cron: '17 * * * *'
  workflow_dispatch:
    inputs:
      dry_run:
        description: '投稿せず動作確認（チェックで投稿・コミットをスキップ）'
        type: boolean
        default: false
      announce_test:
        description: '時刻に関係なく翌日告知の判定を走らせる（テスト用）'
        type: boolean
        default: false

# 同時実行を抑止（前のRunが走っててもキューで直列化）
concurrency:
  group: wnl-bot
  cancel-in-progress: false

jobs:
  run:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    permissions:
      contents: write   # schedule_data.json のコミット用

    steps:
      - name: Checkout (full history)
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run bot (reconcile)
        env:
          TWITTER_API_KEY: ${{ secrets.TWITTER_API_KEY }}
          TWITTER_API_SECRET: ${{ secrets.TWITTER_API_SECRET }}
          TWITTER_ACCESS_TOKEN: ${{ secrets.TWITTER_ACCESS_TOKEN }}
          TWITTER_ACCESS_TOKEN_SECRET: ${{ secrets.TWITTER_ACCESS_TOKEN_SECRET }}
          SKIP_TWEET_FLAG: ${{ github.event.inputs.dry_run }}
          ANNOUNCE_TEST: ${{ github.event.inputs.announce_test }}
          TZ: 'Asia/Tokyo'
        run: python src/weather_bot.py

      - name: Commit schedule state
        if: success() && github.event.inputs.dry_run != 'true'
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: 'BOT: update schedule state'
          file_pattern: schedule_data.json
